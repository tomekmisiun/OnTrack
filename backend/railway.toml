# FastAPI production API — Railway service: ontrack-back
# Railway Settings → Source → Root Directory: backend
# Railway Settings → Source → Config file path: /backend/railway.toml
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "alembic/**",
  "app/**",
  "data/**",
  "scripts/**",
  "pyproject.toml",
  "uv.lock",
]

[deploy]
preDeployCommand = "sh scripts/run-migrations.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
