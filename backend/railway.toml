# FastAPI production API — Railway service: ontrack-back
# Railway Settings → Source → Root Directory: backend
# Railway Settings → Source → Config file path: railway.toml (or backend/railway.toml)
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "app/**",
  "data/**",
  "scripts/**",
  "pyproject.toml",
  "uv.lock",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
