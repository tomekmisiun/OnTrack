# FastAPI production API — Railway service: ontrack-back
# Railway Settings → Source → Root Directory: backend
# Railway Settings → Source → Config file path: railway.toml (relative to Root Directory)
#   or /backend/railway.toml when browsing from repo root (see docs.railway.com/config-as-code)
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "app/**",
  "data/**",
  "scripts/**",
  "pyproject.toml",
  "uv.lock",
]

[deploy]
preDeployCommand = "sh scripts/run-migrations.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
