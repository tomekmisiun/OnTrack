# FastAPI production API — Railway service: ontrack-back (canonical prod config)
# Root Directory: backend
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "app/**",
  "data/**",
  "scripts/**",
  "pyproject.toml",
  "uv.lock",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
