name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # On main, let CI finish so Railway (or deploy-production) sees a green run.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Ustaw Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Uruchom testy FastAPI
        working-directory: backend
        run: |
          uv sync --dev
          uv run ruff check .
          uv run python -m app.scripts.build_catalog --check
          uv run python scripts/validate_runtime_data.py
          uv run pytest tests/contract/ tests/integration/test_worker_catalog_seed.py \
            tests/test_health.py tests/test_dish_compare_data.py tests/test_catalog_pipeline.py \
            -q --cov=app --cov-report=term-missing --cov-fail-under=50
        env:
          TESTING: "1"
          DATABASE_URL: "sqlite://"
          FLASK_SECRET_KEY: ci-test-flask-secret-key-0123456789abcdef
          JWT_SECRET_KEY: ci-test-jwt-secret-key-0123456789abcdef
          GOOGLE_CLIENT_ID: ci-test-google-client-id
          GOOGLE_CLIENT_SECRET: ci-test-google-client-secret

      - name: Ustaw Node.js (OpenAPI export)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sprawdź drift OpenAPI
        working-directory: backend
        run: |
          node ../frontend-next/scripts/export-openapi.mjs
          git diff --exit-code ../frontend-next/openapi/openapi.json

  frontend-next:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Lint, typecheck i build frontend-next
        working-directory: frontend-next
        run: |
          npm ci
          npm run generate:api
          npm run test
          npm run lint
          npm run typecheck
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5001

  frontend-next-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Playwright smoke tests
        working-directory: frontend-next
        run: |
          npm ci
          npm run generate:api
          npx playwright install --with-deps chromium
          npm run test:e2e
        env:
          CI: "true"
          NEXT_PUBLIC_API_URL: http://localhost:5001

  frontend-next-e2e-auth:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ontrack
          POSTGRES_PASSWORD: ontrack
          POSTGRES_DB: ontrack_auth_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ontrack -d ontrack_auth_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          prune-cache: false

      - name: Ustaw Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Start FastAPI and migrate DB
        working-directory: backend
        run: |
          uv sync --dev
          export DATABASE_URL=postgresql+psycopg://ontrack:ontrack@localhost:5432/ontrack_auth_e2e
          export FLASK_SECRET_KEY=ci-test-flask-secret-key-0123456789abcdef
          export JWT_SECRET_KEY=ci-test-jwt-secret-key-0123456789abcdef
          export FRONTEND_URL=http://127.0.0.1:3002
          export BACKEND_DEBUG=1
          sh scripts/run-migrations.sh
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 5001 > /tmp/ontrack-api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5001/health && break
            sleep 1
          done
          curl -sf http://127.0.0.1:5001/health

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Playwright auth full-stack test
        working-directory: frontend-next
        run: |
          npm ci
          npm run generate:api
          npx playwright install --with-deps chromium
          npm run test:e2e:auth
        env:
          CI: "true"
          E2E_API_URL: http://127.0.0.1:5001
          NEXT_PUBLIC_API_URL: http://127.0.0.1:5001

  backend-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Build FastAPI backend image
        run: docker build -t ontrack-fastapi backend

  frontend-next-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Build frontend-next production image
        run: |
          docker build -t ontrack-frontend-next \
            -f frontend-next/Dockerfile.railway \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:5001 \
            frontend-next

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ontrack
          POSTGRES_PASSWORD: ontrack
          POSTGRES_DB: ontrack_rehearsal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ontrack -d ontrack_rehearsal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Ustaw Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: DB rehearsal — stamp on legacy schema
        working-directory: backend
        run: |
          uv sync --dev
          uv run pytest tests/integration/ -v
        env:
          TEST_DATABASE_URL: postgresql+psycopg://ontrack:ontrack@localhost:5432/ontrack_rehearsal
          FLASK_SECRET_KEY: ci-test-flask-secret-key-0123456789abcdef
          JWT_SECRET_KEY: ci-test-jwt-secret-key-0123456789abcdef

  deploy-production:
    name: Deploy to Railway (production)
    needs:
      - test
      - frontend-next
      - frontend-next-e2e
      - frontend-next-e2e-auth
      - backend-docker
      - frontend-next-docker
      - backend-integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Deploy backend (ontrack-back)
        working-directory: backend
        run: railway up --service=ontrack-back --ci --detach

      - name: Deploy frontend (ontrackapp)
        working-directory: frontend-next
        run: railway up --service=ontrackapp --ci --detach
