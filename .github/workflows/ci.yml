name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Uruchom testy
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite:///:memory:
          FLASK_SECRET_KEY: ci-test-flask-secret-key-0123456789abcdef
          JWT_SECRET_KEY: ci-test-jwt-secret-key-0123456789abcdef
          GOOGLE_CLIENT_ID: ci-test-google-client-id
          GOOGLE_CLIENT_SECRET: ci-test-google-client-secret

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Zaloguj do Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Zbuduj i pushuj obraz backendu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/meal-planner-backend:latest

      - name: Zbuduj i pushuj obraz frontendu
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/meal-planner-frontend:latest