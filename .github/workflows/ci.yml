name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Ustaw Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Uruchom testy
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite:///:memory:
          FLASK_SECRET_KEY: ci-test-flask-secret-key-0123456789abcdef
          JWT_SECRET_KEY: ci-test-jwt-secret-key-0123456789abcdef
          GOOGLE_CLIENT_ID: ci-test-google-client-id
          GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
