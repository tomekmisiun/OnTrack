name: Visual regression

# Optional Playwright screenshot suite (mocked API). Not required for PR merge or deploy.
# Run manually before UI-heavy releases or after intentional visual changes.

on:
  workflow_dispatch:

concurrency:
  group: visual-regression
  cancel-in-progress: true

jobs:
  visual-screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Ustaw Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Playwright visual regression
        working-directory: frontend-next
        run: |
          npm ci
          npm run generate:api
          npx playwright install --with-deps chromium
          npm run test:e2e:visual
        env:
          CI: "true"
          NEXT_PUBLIC_API_URL: http://localhost:5001
