name: Production auth smoke

# Scheduled / manual check against live production URLs.
# Main post-deploy gate: job production-smoke in ci.yml on push to main.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: production-smoke
  cancel-in-progress: false

jobs:
  auth-smoke:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Run production auth smoke
        env:
          API_URL: ${{ secrets.PRODUCTION_API_URL }}
          FRONTEND_ORIGIN: ${{ secrets.PRODUCTION_FRONTEND_ORIGIN }}
        run: |
          if [ -z "${API_URL:-}" ]; then
            echo "PRODUCTION_API_URL secret is not configured in the production environment — skipping."
            exit 0
          fi
          chmod +x backend/scripts/verify-production-auth.sh
          ./backend/scripts/verify-production-auth.sh
