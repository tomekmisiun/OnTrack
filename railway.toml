# Legacy Railway config — repo root context (rollback only).
# Target deploy: Root Directory = backend, config backend/railway.toml
# See docs/deployment/RAILWAY_BACKEND_MIGRATION.md
#
# WARNING: dockerfilePath below is INVALID after DATA-004 (Dockerfile.railway removed).
# Use only for rollback reference until DATA-006 removes this file.
[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile.railway"
watchPatterns = [
  "backend/**",
  "app/user_seeds/**",
  "app/dish_compare/**",
  "scraper/data/macros/**",
  "scraper/data/built/**",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
